name: PipSight Robot — daily OHLC (ADX/candles)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipsight-daily-ohlc
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch daily OHLC
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: node fetch-daily-ohlc.js

      - name: Commit updated OHLC
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "pipsight-robot"
          git config user.email "actions@users.noreply.github.com"

          git add data/daily-ohlc.json

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "robot: refresh daily OHLC"

            # Sync with latest remote changes
            git pull --rebase origin main

            # Push changes
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Log execution
        if: always()
        run: |
          echo "✅ Daily OHLC updated at $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow completed successfully"
