name: PipSight Robot — live GBP/JPY tick

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch live tick
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: node fetch-gbpjpy-live.js

      - name: Commit updated tick
        run: |
          git config user.name "pipsight-robot"
          git config user.email "actions@users.noreply.github.com"
          git add data/gbpjpy-live.json
          git diff --quiet --cached || git commit -m "robot: refresh live GBP/JPY tick"
          git pull --rebase origin main
          git push
