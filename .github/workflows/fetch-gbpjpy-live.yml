name: PipSight Robot — live GBP/JPY tick

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipsight-live-gbpjpy
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch live tick
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: node fetch-gbpjpy-live.js

      - name: Commit updated tick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "pipsight-robot"
          git config user.email "actions@users.noreply.github.com"

          git add data/gbpjpy-live.json

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "robot: refresh live GBP/JPY tick"

            # Sync with latest remote changes
            git pull --rebase origin main

            # Push changes
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Log execution
        if: always()
        run: |
          echo "✅ Live GBP/JPY tick updated at $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow completed successfully"
