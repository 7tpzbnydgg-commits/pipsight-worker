name: PipSight Robot — intraday H1 (H4 derived)

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (also triggered by cron-job.org)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch intraday H1
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: node fetch-intraday-h1.js

      - name: Commit updated H1 data
        run: |
          git config user.name "pipsight-robot"
          git config user.email "actions@users.noreply.github.com"
          git add data/intraday-h1.json
          git diff --quiet --cached || git commit -m "robot: refresh intraday H1"
          git pull --rebase origin main
          git push
