name: PipSight Robot — fetch news

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipsight-robots
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run robot
        run: node fetch-news.js

      - name: Commit updated feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "pipsight-robot"
          git config user.email "actions@users.noreply.github.com"

          git add data/news-feed.json

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "robot: refresh news feed"

            # Sync with latest remote changes
            git pull --rebase origin main

            # Push changes
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Log execution
        if: always()
        run: |
          echo "✅ News feed updated at $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow completed successfully"
