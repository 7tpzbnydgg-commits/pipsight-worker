name: PipSight Robot — fetch signals

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run signal engine
        run: node fetch-signals.js

      - name: Commit updated signals
        run: |
          git config user.name "pipsight-robot"
          git config user.email "actions@users.noreply.github.com"
          git add data/signals.json data/signal-log.json
          git diff --quiet --cached || git commit -m "robot: refresh signals"
          git push
