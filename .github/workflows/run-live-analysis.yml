name: PipSight Robot — live analysis (background)

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (also triggered by cron-job.org)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run live analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node run-live-analysis.js

      - name: Commit updated analysis
        run: |
          git config user.name "pipsight-robot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live-analysis.json data/analysis-history.json data/notify-state.json
          git diff --quiet --cached || git commit -m "robot: refresh live analysis"
          git pull --rebase origin main
          git push

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="🚨 PipSight workflow FAILED: live analysis (background) — run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            echo "Telegram secrets not set — skipping failure notification"
          fi
