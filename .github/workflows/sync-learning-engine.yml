name: Sync Learning Engine State

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pipsight-robots
  cancel-in-progress: false

jobs:
  sync-learning:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch and Save Learning State
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking for learning data exports..."

          if [ -f "learning-export.json" ]; then
            echo "Found learning export, saving to GitHub..."
            node save-learning-state.js
          else
            echo "No learning export found yet"
          fi

      - name: Log execution
        if: always()
        run: |
          echo "✅ Learning engine sync completed at $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow completed successfully"
