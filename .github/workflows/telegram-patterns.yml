name: Send Pattern Alerts to Telegram

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipsight-robots
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Send Pattern Alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node telegram-pattern-alerts.js

      - name: Log execution
        if: always()
        run: |
          echo "✅ Telegram pattern alerts completed at $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow completed successfully"
