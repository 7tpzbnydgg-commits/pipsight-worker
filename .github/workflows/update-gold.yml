name: Update Gold Price History

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipsight-robots
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch live gold price and update history file
        run: node scripts/update-history.js

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/xau-usd-history.json

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Update gold price history [skip ci]"

            # Sync with latest remote changes
            git pull --rebase origin main

            # Push changes
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Log execution
        if: always()
        run: |
          echo "✅ Gold price history updated at $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow completed successfully"
