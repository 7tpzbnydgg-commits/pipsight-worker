<script>
// Self-learning engine instance — tracks every signal this dashboard issues
// and its eventual WIN/LOSS outcome, so confidence scores can adapt over time.
// Browser has no filesystem, so persistence uses localStorage instead of the
// fs.writeFileSync data/*.json pattern from the Node.js integration guide.
const PIPLEARNER_STORAGE_KEY = "pipsight_learning_v1";
const pipLearner = (typeof PipSightLearner !== "undefined") ? new PipSightLearner() : null;
if(pipLearner){
  try{
    const saved = localStorage.getItem(PIPLEARNER_STORAGE_KEY);
    if(saved) pipLearner.importData(JSON.parse(saved));
  }catch(e){ console.log("Learner data load failed:", e.message); }
}
function persistLearner(){
  if(!pipLearner) return;
  try{ localStorage.setItem(PIPLEARNER_STORAGE_KEY, JSON.stringify(pipLearner.exportData())); }
  catch(e){ console.log("Learner data save failed:", e.message); }
}

const PAIRS = [
  { type: "metal", symbol: "XAU", quote: "USD", label: "XAU/USD", tvSymbol: "OANDA:XAUUSD" },
  { type: "forex", base: "GBP", quote: "JPY", label: "GBP/JPY", tvSymbol: "OANDA:GBPJPY" },
];

const NEWS_FALLBACK = [
  { pair: "XAU/USD", date: "5 Jul 2026", sentiment: 15, source: "Golden Ark Reserve / FXStreet", impact: "high",
    text: "Gold posted its first weekly gain in five weeks after a soft June payrolls report cooled bets on a near-term Fed hike, lifting spot back above $4,150." },
  { pair: "XAU/USD", date: "7 Jul 2026", sentiment: -10, source: "RoboForex", impact: "high",
    text: "Gold is consolidating near $4,140 with MACD momentum fading on the daily chart; markets are waiting on Wednesday's FOMC minutes for the next directional cue." },
  { pair: "XAU/USD", date: "6 Jul 2026", sentiment: -15, source: "OCBC Bank via LiteFinance", impact: "normal",
    text: "OCBC expects gold to drift lower into year-end on rising Treasury yields and a firmer dollar, even as most desks keep a bullish multi-year view intact." },
  { pair: "GBP/JPY", date: "6 Jul 2026", sentiment: 15, source: "Economies.com", impact: "normal",
    text: "GBP/JPY reclaimed the 214.50 support and pushed toward 216, with momentum indicators favoring a test of 217.55 resistance in the near term." },
  { pair: "GBP/JPY", date: "6 Jul 2026", sentiment: 10, source: "ExchangeRates.org.uk", impact: "normal",
    text: "The pair is trading above its 8, 21, 50 and 100-day averages after rebounding from a February low, though longer-range forecasts see it easing back into 2027." },
];

const SHARED_NEWS_URL = "https://raw.githubusercontent.com/7tpzbnydgg-commits/pipsight-worker/main/data/news-feed.json";

const SHARED_SIGNAL_LOG_URL = "https://raw.githubusercontent.com/7tpzbnydgg-commits/pipsight-worker/main/data/signal-log.json";
let SIGNAL_LOG = [];
let SIGNAL_LOG_STATUS = { active:false, note:"Using this-device-only log — robot signal log not yet reachable" };

async function fetchRobotSignalLog(){
  try{
    const res = await fetch(SHARED_SIGNAL_LOG_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error("log unavailable (" + res.status + ")");
    const data = await res.json();
    if(!Array.isArray(data)) throw new Error("unexpected log format");
    SIGNAL_LOG = data;
    SIGNAL_LOG_STATUS = { active:true, note:null };
  } catch(e){
    SIGNAL_LOG = [];
    SIGNAL_LOG_STATUS = { active:false, note:"Using this-device-only log — " + (e.message||"robot signal log not reachable") };
  }
}

let NEWS = NEWS_FALLBACK.slice();
let ROBOT_STATUS = { active:false, updatedAt:null, sourceCount:0, note:"Using static snapshot — robot feed not yet reachable" };

function newsSentimentByPair(){
  return NEWS.reduce((acc,n)=>{ acc[n.pair]=(acc[n.pair]||0)+n.sentiment; return acc; },{});
}

async function fetchRobotNews(){
  try{
    const res = await fetch(SHARED_NEWS_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error("feed unavailable (" + res.status + ")");
    const data = await res.json();
    if(!data || !Array.isArray(data.items) || !data.items.length) throw new Error("empty feed");
    const items = data.items.filter(n => n && n.pair && typeof n.sentiment === "number" && n.text);
    if(!items.length) throw new Error("no usable items");
    NEWS = items;
    ROBOT_STATUS = {
      active: true,
      updatedAt: data.updatedAt || null,
      sourceCount: new Set(items.map(n=>n.source)).size,
      note: null,
    };
  } catch(e){
    NEWS = NEWS_FALLBACK.slice();
    ROBOT_STATUS = { active:false, updatedAt:null, sourceCount:0, note:"Using static snapshot — " + (e.message||"robot feed not reachable") };
  }
}

function isoWeekKey(dateStr){
  const d = new Date(dateStr + "T00:00:00Z");
  const day = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - day + 3);
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const fdDay = (firstThursday.getUTCDay() + 6) % 7;
  const week = 1 + Math.round(((d - firstThursday) / 86400000 - 3 + fdDay) / 7);
  return d.getUTCFullYear() + "-W" + String(week).padStart(2, "0");
}
function resampleWeekly(rows){
  const map = new Map();
  for(const r of rows){ map.set(isoWeekKey(r.date), r); }
  return Array.from(map.values());
}
function rowsForMode(rows, mode){
  return mode === "weekly" ? resampleWeekly(rows) : rows;
}

function decimalsFor(pair){
  if(pair.type === "metal") return 2;
  if(pair.quote === "JPY") return 3;
  return 4;
}

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function emaSeries(values,period){
  const k=2/(period+1); const out=[]; let prev=null;
  for(let i=0;i<values.length;i++){
    if(i===period-1){ const seed=values.slice(0,period).reduce((a,b)=>a+b,0)/period; prev=seed; out.push(seed); }
    else if(i<period-1){ out.push(null); }
    else { prev = values[i]*k + prev*(1-k); out.push(prev); }
  }
  return out;
}

function rsiSeries(values,period=14){
  const out=new Array(values.length).fill(null);
  let gainSum=0,lossSum=0;
  for(let i=1;i<=period;i++){ const d=values[i]-values[i-1]; if(d>=0) gainSum+=d; else lossSum-=d; }
  let avgGain=gainSum/period, avgLoss=lossSum/period;
  out[period]= avgLoss===0?100:100-100/(1+avgGain/avgLoss);
  for(let i=period+1;i<values.length;i++){
    const d=values[i]-values[i-1]; const g=d>0?d:0; const l=d<0?-d:0;
    avgGain=(avgGain*(period-1)+g)/period; avgLoss=(avgLoss*(period-1)+l)/period;
    out[i]= avgLoss===0?100:100-100/(1+avgGain/avgLoss);
  }
  return out;
}

function computeVolatility(rows){
  const closes = rows.map(r=>r.close);
  const n = closes.length;
  if(n<3) return 0.004;
  let sum=0, count=0;
  for(let i=1;i<n;i++){ sum += Math.abs(closes[i]-closes[i-1]) / closes[i-1]; count++; }
  return sum/count;
}

function computeADX(ohlcRows, period=14){
  const n = ohlcRows.length;
  if(n < period*2+1) return null;

  const tr=[], plusDM=[], minusDM=[];
  for(let i=1;i<n;i++){
    const cur=ohlcRows[i], prev=ohlcRows[i-1];
    tr.push(Math.max(cur.high-cur.low, Math.abs(cur.high-prev.close), Math.abs(cur.low-prev.close)));
    const upMove = cur.high-prev.high, downMove = prev.low-cur.low;
    plusDM.push(upMove>downMove && upMove>0 ? upMove : 0);
    minusDM.push(downMove>upMove && downMove>0 ? downMove : 0);
  }

  let trSum=0, pdmSum=0, mdmSum=0;
  for(let i=0;i<period;i++){ trSum+=tr[i]; pdmSum+=plusDM[i]; mdmSum+=minusDM[i]; }

  const dxSeries=[];
  let trN=trSum, pdmN=pdmSum, mdmN=mdmSum;
  for(let i=period;i<tr.length;i++){
    trN = trN - (trN/period) + tr[i];
    pdmN = pdmN - (pdmN/period) + plusDM[i];
    mdmN = mdmN - (mdmN/period) + minusDM[i];
    const plusDI = trN===0?0:100*(pdmN/trN);
    const minusDI = trN===0?0:100*(mdmN/trN);
    const dx = (plusDI+minusDI)===0 ? 0 : 100*Math.abs(plusDI-minusDI)/(plusDI+minusDI);
    dxSeries.push(dx);
  }
  if(dxSeries.length < period) return null;

  let adx = dxSeries.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<dxSeries.length;i++){ adx = (adx*(period-1)+dxSeries[i])/period; }
  return adx;
}

function detectCandlePattern(ohlcRows, leanDirection){
  const n = ohlcRows.length;
  if(n<2 || !leanDirection) return { ok:false, detail:"Not enough candle history" };
  const last = ohlcRows[n-1], prev = ohlcRows[n-2];
  const range = last.high-last.low;
  const body = Math.abs(last.close-last.open);
  const bodyPct = range>0 ? body/range : 0;

  if(leanDirection==="BUY"){
    const bullishEngulfing = prev.close<prev.open && last.close>last.open &&
                              last.open<=prev.close && last.close>=prev.open;
    if(bullishEngulfing) return { ok:true, detail:"Bullish engulfing on the latest candle" };
    if(last.close>last.open && bodyPct>0.6) return { ok:true, detail:`Strong bullish candle (body ${(bodyPct*100).toFixed(0)}% of range)` };
    return { ok:false, detail:"Latest candle doesn't confirm a bullish pattern" };
  } else {
    const bearishEngulfing = prev.close>prev.open && last.close<last.open &&
                              last.open>=prev.close && last.close<=prev.open;
    if(bearishEngulfing) return { ok:true, detail:"Bearish engulfing on the latest candle" };
    if(last.close<last.open && bodyPct>0.6) return { ok:true, detail:`Strong bearish candle (body ${(bodyPct*100).toFixed(0)}% of range)` };
    return { ok:false, detail:"Latest candle doesn't confirm a bearish pattern" };
  }
}

function computeSR(rows, lastClose){
  const closes = rows.map(r=>r.close);
  const n = closes.length;
  const radius = n > 40 ? 2 : 1;
  const highs = [], lows = [];
  for(let i=radius;i<n-radius;i++){
    let isHigh=true, isLow=true;
    for(let k=1;k<=radius;k++){
      if(closes[i]<closes[i-k]||closes[i]<closes[i+k]) isHigh=false;
      if(closes[i]>closes[i-k]||closes[i]>closes[i+k]) isLow=false;
    }
    if(isHigh) highs.push(closes[i]);
    if(isLow) lows.push(closes[i]);
  }
  function dedupe(levels){
    const sorted = [...levels].sort((a,b)=>a-b);
    const out = [];
    for(const v of sorted){
      if(!out.length || Math.abs(v-out[out.length-1])/v > 0.0015) out.push(v);
      else out[out.length-1] = (out[out.length-1]+v)/2;
    }
    return out;
  }
  let resistances = dedupe(highs).filter(h=>h>lastClose).sort((a,b)=>a-b).slice(0,2);
  let supports = dedupe(lows).filter(l=>l<lastClose).sort((a,b)=>b-a).slice(0,2);
  if(resistances.length===0 && n>=3){
    const maxClose = Math.max(...closes);
    if(maxClose > lastClose*1.0005) resistances = [maxClose];
  }
  if(supports.length===0 && n>=3){
    const minClose = Math.min(...closes);
    if(minClose < lastClose*0.9995) supports = [minClose];
  }
  return { resistances, supports };
}

function computeFibLevels(rows){
  const closes = rows.map(r=>r.close);
  const n = closes.length;
  if(n<5) return null;
  const lookback = Math.min(n, 90);
  const slice = closes.slice(n-lookback);
  const hi = Math.max(...slice), lo = Math.min(...slice);
  if(hi===lo) return null;
  const diff = hi-lo;
  return {
    hi, lo,
    levels: [
      {label:"23.6%", value: hi-diff*0.236},
      {label:"38.2%", value: hi-diff*0.382},
      {label:"50.0%", value: hi-diff*0.5},
      {label:"61.8%", value: hi-diff*0.618},
      {label:"78.6%", value: hi-diff*0.786},
    ],
  };
}

function computeMarketStructure(rows){
  const closes = rows.map(r=>r.close);
  const n = closes.length;
  if(n<10) return {label:"Building history — not enough sessions yet", score:0};
  const radius = n>60?3:(n>30?2:1);
  const highs=[], lows=[];
  for(let i=radius;i<n-radius;i++){
    let isHigh=true, isLow=true;
    for(let k=1;k<=radius;k++){
      if(closes[i]<closes[i-k]||closes[i]<closes[i+k]) isHigh=false;
      if(closes[i]>closes[i-k]||closes[i]>closes[i+k]) isLow=false;
    }
    if(isHigh) highs.push(closes[i]);
    if(isLow) lows.push(closes[i]);
  }
  if(highs.length<2 || lows.length<2) return {label:"Not enough swing points yet", score:0};
  const h2 = highs.slice(-2), l2 = lows.slice(-2);
  const higherHigh = h2[1] > h2[0];
  const higherLow = l2[1] > l2[0];
  if(higherHigh && higherLow) return {label:"Bullish structure — higher highs & higher lows", score:15};
  if(!higherHigh && !higherLow) return {label:"Bearish structure — lower highs & lower lows", score:-15};
  return {label:"Mixed structure — no clear HH/HL or LH/LL sequence", score:0};
}

function trendDirectionOf(rows){
  const closes = rows.map(r=>r.close);
  const n = closes.length;
  if(n<6) return null;
  const lastClose = closes[n-1];
  const cap=n-1;
  const p200=Math.min(200,cap);
  const p100=Math.min(100,Math.max(4,Math.floor(p200*0.5)));
  const p50=Math.min(50,Math.max(3,Math.floor(p100*0.6)));
  const p20=Math.min(20,Math.max(2,Math.floor(p50*0.5)));
  const e20=emaSeries(closes,p20), e50=emaSeries(closes,p50), e100=emaSeries(closes,p100), e200=emaSeries(closes,p200);
  const last=n-1;
  const v20=e20[last], v50=e50[last], v100=e100[last], v200=e200[last];
  if(v20==null||v50==null||v100==null||v200==null) return null;
  const bullFull = v20>v50 && v50>v100 && v100>v200 && lastClose>v20;
  const bearFull = v20<v50 && v50<v100 && v100<v200 && lastClose<v20;
  if(bullFull) return "BUY";
  if(bearFull) return "SELL";
  return null;
}

function newsItemsFor(pairLabel){
  return NEWS.filter(n=>n.pair===pairLabel);
}

function analyze(rows, pairLabel, htfRows, ohlcRows){
  const closes = rows.map(r=>r.close);
  const n = closes.length;
  const lastClose = closes[n-1];
  const pipeline = [];
  let alive = true;

  function pass(name, ok, detail){
    pipeline.push({name, status: ok?"pass":"fail", detail});
    if(!ok) alive=false;
    return ok;
  }
  function na(name, detail){ pipeline.push({name, status:"na", detail}); }

  let emaInfo=null, leanDirection=null, trendLabel="Building history — not enough sessions yet";
  if(n>=6){
    const cap=n-1;
    const p200=Math.min(200,cap);
    const p100=Math.min(100,Math.max(4,Math.floor(p200*0.5)));
    const p50=Math.min(50,Math.max(3,Math.floor(p100*0.6)));
    const p20=Math.min(20,Math.max(2,Math.floor(p50*0.5)));
    const e20=emaSeries(closes,p20), e50=emaSeries(closes,p50), e100=emaSeries(closes,p100), e200=emaSeries(closes,p200);
    const last=n-1;
    const v20=e20[last], v50=e50[last], v100=e100[last], v200=e200[last];
    const fullStack = cap>=200;
    const note = fullStack ? "" : " (adaptive periods — full EMA200 needs more history)";
    emaInfo = {p20,p50,p100,p200,fullStack};
    if(v20!=null&&v50!=null&&v100!=null&&v200!=null){
      const bullFull = v20>v50 && v50>v100 && v100>v200 && lastClose>v20;
      const bearFull = v20<v50 && v50<v100 && v100<v200 && lastClose<v20;
      const bullCount=[v20>v50,v50>v100,v100>v200,lastClose>v20].filter(Boolean).length;
      const bearCount=[v20<v50,v50<v100,v100<v200,lastClose<v20].filter(Boolean).length;
      if(bullFull){ leanDirection="BUY"; trendLabel=`Bullish — full EMA stack ${p20}>${p50}>${p100}>${p200}${note}`; }
      else if(bearFull){ leanDirection="SELL"; trendLabel=`Bearish — full EMA stack ${p20}<${p50}<${p100}<${p200}${note}`; }
      else if(bullCount>=3){ trendLabel=`Partial bullish lean only (${bullCount}/4) — not enough to qualify${note}`; }
      else if(bearCount>=3){ trendLabel=`Partial bearish lean only (${bearCount}/4) — not enough to qualify${note}`; }
      else { trendLabel=`Mixed EMA alignment — no clear trend${note}`; }
    }
  }
  pass("Trend", !!leanDirection, trendLabel);

  pass("EMA Alignment", !!leanDirection,
    leanDirection ? `Full EMA stack confirms ${leanDirection==="BUY"?"bullish":"bearish"} alignment` : "Stack is not fully aligned in order");

  const adxVal = ohlcRows ? computeADX(ohlcRows, 14) : null;
  if(adxVal!=null){
    na("ADX > 25?", `Informational — ADX(14) = ${adxVal.toFixed(1)} (${adxVal>25?"trending":"ranging"} strength); shown for context, doesn't block the signal`);
  } else {
    na("ADX > 25?", "Not available — true ADX needs high/low candle data, which this close-price-only source doesn't provide");
  }
  na("Volume Confirmed?", "Not available — spot FX/gold has no centralized exchange volume feed");

  const macdOk = n>=35;
  let lastMacd=null, lastMacdSignal=null;
  if(macdOk){
    const ema12=emaSeries(closes,12), ema26=emaSeries(closes,26);
    const macdLine = closes.map((_,i)=>(ema12[i]!=null&&ema26[i]!=null)?ema12[i]-ema26[i]:null);
    const macdVals = macdLine.filter(v=>v!=null);
    const sig = emaSeries(macdVals,9);
    lastMacd = macdLine[n-1];
    lastMacdSignal = sig[sig.length-1];
  }
  let macdDetail, macdPassVal=false;
  if(!leanDirection){ macdDetail = "No confirmed trend direction to test against"; }
  else if(!macdOk){ macdDetail = `Needs ${35-n} more session${35-n===1?"":"s"} of history for MACD`; }
  else {
    macdPassVal = leanDirection==="BUY" ? lastMacd>lastMacdSignal : lastMacd<lastMacdSignal;
    macdDetail = `MACD ${lastMacd.toFixed(4)} vs signal ${lastMacdSignal.toFixed(4)} — ${macdPassVal?"confirms":"does not confirm"} ${leanDirection}`;
  }
  pass("MACD Confirmation", leanDirection ? (macdOk && macdPassVal) : false, macdDetail);

  const rsiP = Math.min(14, Math.max(4, n-2));
  const rsi = rsiSeries(closes, rsiP);
  const lastRsi = rsi[n-1];
  const rsiBuyOk = lastRsi!=null && lastRsi>=45 && lastRsi<=65;
  const rsiSellOk = lastRsi!=null && lastRsi>=35 && lastRsi<=55;
  let rsiDetail, rsiPassVal=false;
  if(!leanDirection){ rsiDetail = "No confirmed trend direction to test against"; }
  else if(lastRsi==null){ rsiDetail = "Not enough history for RSI yet"; }
  else {
    rsiPassVal = leanDirection==="BUY" ? rsiBuyOk : rsiSellOk;
    rsiDetail = `RSI(${rsiP}) = ${lastRsi.toFixed(1)} — ${rsiPassVal?"inside":"outside"} the ${leanDirection==="BUY"?"45–65":"35–55"} confirmation band`;
  }
  pass("RSI Confirmation", leanDirection ? (lastRsi!=null && rsiPassVal) : false, rsiDetail);

  let htfDetail, htfPassVal=false, htfDirection=null;
  if(!leanDirection){ htfDetail = "No confirmed trend direction to test against"; }
  else if(htfRows===null || htfRows===undefined){
    htfPassVal = true;
    htfDetail = "Already viewing the highest timeframe available for this pair — no higher chart to confirm against";
  } else {
    htfDirection = trendDirectionOf(htfRows);
    if(htfDirection==null){ htfDetail = "Higher-timeframe (weekly) trend isn't clearly aligned yet — mixed or insufficient EMA stack there"; }
    else {
      htfPassVal = htfDirection===leanDirection;
      htfDetail = `Weekly-close trend is ${htfDirection} — ${htfPassVal?"agrees with":"conflicts with"} this ${leanDirection} lean`;
    }
  }
  pass("Multi-Timeframe Confirmation", leanDirection ? htfPassVal : false, htfDetail);

  if(ohlcRows && leanDirection){
    const cp = detectCandlePattern(ohlcRows, leanDirection);
    pass("Candle Pattern", cp.ok, cp.detail);
  } else {
    na("Candle Pattern", "Not available — only daily close prices here, no open/high/low candle data");
  }

  const recentNews = newsItemsFor(pairLabel);
  let newsFilterDetail, newsFilterPassVal=false;
  if(!leanDirection){ newsFilterDetail = "No confirmed trend direction to test against"; }
  else {
    const conflicting = recentNews.find(item => item.impact==="high" &&
      ((leanDirection==="BUY" && item.sentiment<=-10) || (leanDirection==="SELL" && item.sentiment>=10)));
    if(conflicting){
      newsFilterPassVal = false;
      const snippet = conflicting.text.length>80 ? conflicting.text.slice(0,80)+"…" : conflicting.text;
      newsFilterDetail = `Conflicting high-impact headline: "${snippet}" (${conflicting.source})`;
    } else {
      const highCount = recentNews.filter(item=>item.impact==="high").length;
      newsFilterPassVal = true;
      newsFilterDetail = highCount ? `${highCount} high-impact headline${highCount===1?"":"s"} tracked, none conflict with this ${leanDirection}` : "No high-impact catalysts currently flagged for this pair";
    }
  }
  if(!leanDirection){ na("High-Impact News Filter", "No confirmed trend direction to test against"); }
  else { na("High-Impact News Filter", `Informational — ${newsFilterDetail}; shown for context, doesn't block the signal`); }

  const sr = computeSR(rows, lastClose);
  let srDetail, srPassVal=false;
  if(!leanDirection){ srDetail = "No confirmed trend direction to test against"; }
  else if(leanDirection==="BUY"){
    const res = sr.resistances[0];
    if(res==null){ srPassVal=true; srDetail="No resistance detected nearby"; }
    else {
      const d=(res-lastClose)/lastClose;
      srPassVal = d>=0.003;
      srDetail = srPassVal ? `Resistance ${(d*100).toFixed(2)}% away — clear room to run` : `Resistance only ${(d*100).toFixed(2)}% above spot — too close to buy into`;
    }
  } else {
    const sup = sr.supports[0];
    if(sup==null){ srPassVal=true; srDetail="No support detected nearby"; }
    else {
      const d=(lastClose-sup)/lastClose;
      srPassVal = d>=0.003;
      srDetail = srPassVal ? `Support ${(d*100).toFixed(2)}% away — clear room to run` : `Support only ${(d*100).toFixed(2)}% below spot — too close to sell into`;
    }
  }
  pass("Support/Resistance", leanDirection ? srPassVal : false, srDetail);

  const vol = computeVolatility(rows);
  const buffer = Math.max(vol*0.5, 0.0004) * lastClose;
  if(leanDirection){
    pipeline.push({name:"ATR-style Stop Loss", status:"pass",
      detail:`Volatility-based buffer ≈ ${buffer.toFixed(lastClose>100?2:5)} (avg daily move ${(vol*100).toFixed(2)}%) — a proxy for true ATR, since no intraday high/low feed exists here`});
  } else {
    pipeline.push({name:"ATR-style Stop Loss", status:"skip", detail:"No confirmed trend direction yet"});
  }

  let tradePlan=null, rrDetail="No confirmed trend direction yet";
  if(leanDirection){
    const sup=sr.supports[0], res=sr.resistances[0];
    let stop, target1, target2, target3, risk;
    if(leanDirection==="BUY"){
      stop = sup!=null? sup-buffer : lastClose-buffer*3;
      risk = lastClose-stop;
      target1 = res!=null? res : lastClose+risk*2;
      target2 = Math.max(target1, lastClose+risk*3);
      target3 = Math.max(target2, lastClose+risk*4);
    } else {
      stop = res!=null? res+buffer : lastClose+buffer*3;
      risk = stop-lastClose;
      target1 = sup!=null? sup : lastClose-risk*2;
      target2 = Math.min(target1, lastClose-risk*3);
      target3 = Math.min(target2, lastClose-risk*4);
    }
    risk = Math.abs(lastClose-stop);
    const reward1 = Math.abs(target1-lastClose);
    const rr = risk>0 ? reward1/risk : 0;
    const rrOk = pass("Risk:Reward ≥ 1:2", rr>=2, `Risk:Reward to TP1 = 1:${rr.toFixed(1)} — ${rr>=2?"meets":"below"} the 1:2 minimum`);
    if(rrOk && alive){ tradePlan = {direction:leanDirection, entry:lastClose, stop, target1, target2, target3, risk, rr}; }
  } else {
    pass("Risk:Reward ≥ 1:2", false, rrDetail);
  }

  const signal = tradePlan ? tradePlan.direction : "HOLD";
  const failedStep = pipeline.find(p=>p.status==="fail");
  const suppressionReason = signal==="HOLD"
    ? (leanDirection ? `NO TRADE — stopped at "${failedStep ? failedStep.name : "an earlier step"}"` : "NO TRADE — no confirmed trend direction yet")
    : null;

  pipeline.push({name:"Final Decision", status: signal!=="HOLD"?"pass":"fail",
    detail: signal!=="HOLD" ? `${signal} — every required check passed` : suppressionReason});

  const structure = computeMarketStructure(rows);
  const newsScore = clamp(newsSentimentByPair()[pairLabel]||0, -10, 10);

  const gatedSteps = pipeline.filter(p=>p.status==="pass"||p.status==="fail");
  const passCount = gatedSteps.filter(p=>p.status==="pass").length;

  let confidence = null;
  if(leanDirection){
    let score = gatedSteps.length ? (passCount/gatedSteps.length)*70 : 0;
    if(structure.score>0 && leanDirection==="BUY") score += 12;
    else if(structure.score<0 && leanDirection==="SELL") score += 12;
    else if(structure.score!==0) score -= 8;
    if(newsScore>=3 && leanDirection==="BUY") score += 9;
    else if(newsScore<=-3 && leanDirection==="SELL") score += 9;
    else if(Math.abs(newsScore)>=3) score -= 9;
    if(htfDirection && htfDirection===leanDirection) score += 9;
    confidence = clamp(Math.round(score), 5, 97);
  }
  pipeline.push({name:"Confidence Score", status:"info",
    detail: confidence!=null
      ? `${confidence}% — composite of pipeline pass-rate, market structure, news alignment & multi-timeframe agreement (informational, doesn't gate the decision above)`
      : "No confirmed trend direction yet to score"});

  return {
    rows, lastClose, n, pipeline,
    trendLabel, emaInfo, leanDirection,
    lastRsi, rsiP, macdOk,
    structure, sr, newsScore, confidence,
    signal, suppressionReason, tradePlan,
    passCount, gatedCount: gatedSteps.length,
  };
}

function getSession(){
  const h = new Date().getUTCHours();
  const inAsia = h>=0 && h<9;
  const inLondon = h>=8 && h<17;
  const inNY = h>=13 && h<22;
  if(inLondon && inNY) return "London / New York overlap — highest liquidity window";
  if(inLondon) return "London session";
  if(inNY) return "New York session";
  if(inAsia) return "Asian (Tokyo) session";
  return "Between major sessions — thinner liquidity";
}

function drawGauge(canvas,score,signal){
  const ctx=canvas.getContext("2d");
  const w=canvas.width=canvas.clientWidth*2, h=canvas.height=canvas.clientHeight*2;
  ctx.clearRect(0,0,w,h);
  const cx=w/2, cy=h*0.85, r=w*0.38;
  ctx.lineWidth=w*0.045; ctx.lineCap="round";
  ctx.strokeStyle="#272A31";
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,2*Math.PI); ctx.stroke();
  const grad=ctx.createLinearGradient(cx-r,cy,cx+r,cy);
  grad.addColorStop(0,"#B5544A"); grad.addColorStop(0.5,"#D08C3B"); grad.addColorStop(1,"#3E9C74");
  ctx.strokeStyle=grad; ctx.globalAlpha=0.35;
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,2*Math.PI); ctx.stroke();
  ctx.globalAlpha=1;
  const angle = Math.PI + ((clamp(score,-100,100)+100)/200)*Math.PI;
  const color = signal==="BUY"?"#3E9C74":signal==="SELL"?"#B5544A":"#D08C3B";
  ctx.strokeStyle=color; ctx.lineWidth=w*0.018;
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+r*0.8*Math.cos(angle), cy+r*0.8*Math.sin(angle));
  ctx.stroke();
  ctx.fillStyle=color; ctx.beginPath(); ctx.arc(cx,cy,w*0.02,0,2*Math.PI); ctx.fill();
}

// Renders a small inline badge showing how old a worker-published data file
// is. `isStaleFlag` comes straight from the "stale" map the worker writes
// into scalp-candles.json / intraday-h1.json / daily-ohlc.json when a fetch
// failed and it had to reuse the previous data for that symbol.
function freshnessBadge(updatedAtISO, maxAgeMinutes, isStaleFlag){
  if(!updatedAtISO){
    return `<span class="mono" style="font-size:10px;color:var(--sell);border:1px solid var(--sell);border-radius:6px;padding:2px 6px;white-space:nowrap;">⚠ no data yet</span>`;
  }
  const ageMs = Date.now() - new Date(updatedAtISO).getTime();
  const ageMin = Math.max(0, Math.round(ageMs / 60000));
  const ageLabel = ageMin < 60 ? `${ageMin}m ago` : `${Math.round(ageMin / 60)}h ago`;
  const warn = isStaleFlag || ageMin > maxAgeMinutes;
  if(!warn){
    return `<span class="mono" style="font-size:10px;color:var(--buy);opacity:.85;white-space:nowrap;">● live · ${ageLabel}</span>`;
  }
  return `<span class="mono" style="font-size:10px;color:var(--hold);border:1px solid var(--hold);border-radius:6px;padding:2px 6px;white-space:nowrap;">⚠ stale · ${ageLabel}${isStaleFlag ? " · worker fallback" : ""}</span>`;
}

async function fetchForexRows(pair){
  const end = new Date();
  const start = new Date(); start.setDate(start.getDate()-420);
  const fmt = d => d.toISOString().slice(0,10);

  const url = `https://api.frankfurter.dev/v1/${fmt(start)}..${fmt(end)}?base=${pair.base}&symbols=${pair.quote}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("Rate service unavailable (" + res.status + ")");
  const data = await res.json();

  const dates = Object.keys(data.rates).sort();
  const rows = dates.map(d=>({date:d, close:data.rates[d][pair.quote]}));

  // Live GBP/JPY price used to come from a dedicated Twelve Data /price call
  // (fetch-gbpjpy-live.js, ~144 credits/day on the free tier). That data was
  // redundant: fetch-scalp-candles.js already pulls GBP/JPY 5-minute candles
  // on the exact same 10-minute cadence, so the latest candle's close is the
  // live price (at most ~5 min old) at zero extra API cost.
  try{
    if(!SCALP_DATA) await fetchScalpCandles();
    const candles = SCALP_DATA ? SCALP_DATA["GBPJPY"] : null;
    const lastClose = candles && candles.length ? candles[candles.length - 1].close : null;
    if(typeof lastClose === "number"){
      const todayStr = new Date().toISOString().slice(0,10);
      if(rows.length && rows[rows.length-1].date === todayStr){
        rows[rows.length-1].close = lastClose;
      } else {
        rows.push({ date: todayStr, close: lastClose });
      }
    }
  }catch(e){
    console.log('Live GBPJPY tick (from scalp candles) failed:', e);
  }

  if(rows.length<30) throw new Error("Not enough history returned for this pair");
  return { rows, statusLabel: "live market rate" };
}

const SHARED_GOLD_HISTORY_URL = "https://raw.githubusercontent.com/7tpzbnydgg-commits/pipsight-worker/main/data/xau-usd-history.json";

const GOLD_HISTORY_KEY = "pipsight_xau_usd_history_v1";
function loadGoldHistory(){
  try{ const raw = localStorage.getItem(GOLD_HISTORY_KEY); return raw ? JSON.parse(raw) : []; }
  catch(e){ return []; }
}
function saveGoldHistory(rows){
  try{ localStorage.setItem(GOLD_HISTORY_KEY, JSON.stringify(rows)); } catch(e){}
}

async function fetchMetalRows(pair){
  const liveRes = await fetch('https://api.gold-api.com/price/' + pair.symbol + '/' + pair.quote);
  if(!liveRes.ok) throw new Error("Live gold price service unavailable (" + liveRes.status + ")");
  const live = await liveRes.json();
  if(typeof live.price !== "number") throw new Error("Unexpected response from gold price service");
  const today = new Date().toISOString().slice(0,10);

  let rows = [];
  let usingSharedHistory = false;

  if(SHARED_GOLD_HISTORY_URL){
    try{
      const sharedRes = await fetch(SHARED_GOLD_HISTORY_URL + "?t=" + Date.now());
      if(sharedRes.ok){
        const shared = await sharedRes.json();
        if(Array.isArray(shared) && shared.length){
          rows = shared.filter(r=>r && typeof r.date==="string" && typeof r.close==="number");
          usingSharedHistory = true;
        }
      }
    } catch(e){ }
  }

  if(!usingSharedHistory){
    rows = loadGoldHistory();
  }

  const idx = rows.findIndex(r => r.date === today);
  if(idx >= 0) rows[idx] = {date: today, close: live.price};
  else rows.push({date: today, close: live.price});
  rows.sort((a,b)=> a.date.localeCompare(b.date));
  if(rows.length > 600) rows = rows.slice(rows.length-600);

  saveGoldHistory(rows);

  const statusLabel = usingSharedHistory
    ? `live spot · 24/7 shared history (${rows.length} sessions)`
    : rows.length < 20
      ? `live spot · building history on this device (${rows.length}/20 sessions)`
      : "live spot · updated just now (this device only)";
  return { rows, statusLabel };
}

const LOG_KEY_BASE = "pipsight_signal_log_v1";
function logKey(mode){ return mode==="weekly" ? LOG_KEY_BASE+"_weekly" : LOG_KEY_BASE; }
function loadLog(mode){
  try{ const raw = localStorage.getItem(logKey(mode)); return raw ? JSON.parse(raw) : []; }
  catch(e){ return []; }
}
function saveLog(mode, log){ try{ localStorage.setItem(logKey(mode), JSON.stringify(log)); }catch(e){} }

function logSignalIfNew(pairLabel, a, mode){
  if(!a.tradePlan) return;
  let log = loadLog(mode);
  const last = [...log].reverse().find(e=>e.pair===pairLabel);
  if(last && !last.status && last.signal===a.signal) return;

  let learnerId = null;
  if(pipLearner){
    learnerId = pipLearner.recordSignal({
      pair: pairLabel.replace("/",""),
      timeframe: mode==="weekly" ? "D1" : "H1",
      strategy: mode==="weekly" ? "weekly" : "daily",
      entry: a.tradePlan.entry,
      indicators: ["EMA","RSI","MACD","Support/Resistance"].concat(ROBOT_STATUS.active ? ["News"] : []),
    });
    persistLearner();
  }

  log.push({
    ts: new Date().toISOString(),
    pair: pairLabel,
    signal: a.tradePlan.direction,
    entry: a.tradePlan.entry,
    stop: a.tradePlan.stop,
    tp1: a.tradePlan.target1,
    rr: a.tradePlan.rr,
    status: null, closedAt: null, closePrice: null,
    learnerId,
  });
  if(log.length>300) log = log.slice(log.length-300);
  saveLog(mode, log);
}

function resolveLogOutcomes(pairLabel, rows, mode){
  let log = loadLog(mode);
  let changed = false;
  log = log.map(e=>{
    if(e.pair!==pairLabel || e.status) return e;
    const entryDate = e.ts.slice(0,10);
    const future = rows.filter(r=>r.date>entryDate);
    for(const r of future){
      if(e.signal==="BUY"){
        if(r.close<=e.stop){ e.status="LOSS"; e.closedAt=r.date; e.closePrice=r.close; changed=true; break; }
        if(r.close>=e.tp1){ e.status="WIN"; e.closedAt=r.date; e.closePrice=r.close; changed=true; break; }
      } else {
        if(r.close>=e.stop){ e.status="LOSS"; e.closedAt=r.date; e.closePrice=r.close; changed=true; break; }
        if(r.close<=e.tp1){ e.status="WIN"; e.closedAt=r.date; e.closePrice=r.close; changed=true; break; }
      }
    }
    if(e.status && pipLearner && e.learnerId){
      const profitPoints = e.status==="WIN" ? Math.abs(e.closePrice-e.entry) : -Math.abs(e.closePrice-e.entry);
      pipLearner.resolveSignal(e.learnerId, e.status, profitPoints);
      persistLearner();
    }
    return e;
  });
  if(changed) saveLog(mode, log);
  return log.filter(e=>e.pair===pairLabel).slice(-8).reverse();
}

function aggregateCandles(candles5m, groupSize){
  if(groupSize===1) return candles5m;
  const out=[];
  for(let i=0;i+groupSize<=candles5m.length;i+=groupSize){
    const chunk = candles5m.slice(i,i+groupSize);
    out.push({
      time: chunk[0].time,
      open: chunk[0].open,
      high: Math.max(...chunk.map(c=>c.high)),
      low: Math.min(...chunk.map(c=>c.low)),
      close: chunk[chunk.length-1].close,
    });
  }
  return out;
}

function analyzeScalp(candles){
  const n = candles.length;
  if(n<30) return { signal:"HOLD", bull:0, bear:0, notes:["Not enough candles yet"] };

  const closes = candles.map(c=>c.close);
  const last = candles[n-1];

  const ema9 = emaSeries(closes,9);
  const ema21 = emaSeries(closes,21);
  const rsi14 = rsiSeries(closes,14);
  const ema12 = emaSeries(closes,12);
  const ema26 = emaSeries(closes,26);
  const macdLine = closes.map((_,i)=>(ema12[i]!=null&&ema26[i]!=null)?ema12[i]-ema26[i]:null);
  const macdVals = macdLine.filter(v=>v!=null);
  const macdSignalSeries = emaSeries(macdVals,9);
  const lastMacd = macdLine[n-1];
  const lastMacdSignal = macdSignalSeries[macdSignalSeries.length-1];
  const lastRsi = rsi14[n-1];
  const lastEma9 = ema9[n-1], lastEma21 = ema21[n-1];

  let bull=0, bear=0; const notes=[];

  if(lastEma9!=null && lastEma21!=null){
    if(lastEma9>lastEma21){ bull++; notes.push("EMA9>EMA21 (bull)"); }
    else { bear++; notes.push("EMA9<EMA21 (bear)"); }
  }
  if(lastRsi!=null){
    if(lastRsi>50){ bull++; notes.push(`RSI ${lastRsi.toFixed(1)} > 50 (bull)`); }
    else { bear++; notes.push(`RSI ${lastRsi.toFixed(1)} < 50 (bear)`); }
  }
  if(lastMacd!=null && lastMacdSignal!=null){
    if(lastMacd>lastMacdSignal){ bull++; notes.push("MACD above signal (bull)"); }
    else { bear++; notes.push("MACD below signal (bear)"); }
  }
  if(lastEma21!=null){
    if(last.close>lastEma21){ bull++; notes.push("Price above EMA21 (bull)"); }
    else { bear++; notes.push("Price below EMA21 (bear)"); }
  }
  if(last.close>last.open){ bull++; notes.push("Last candle green (bull)"); }
  else { bear++; notes.push("Last candle red (bear)"); }

  let signal = "HOLD";
  if(bull>=4 && bull>bear) signal="BUY";
  else if(bear>=4 && bear>bull) signal="SELL";

  return { signal, bull, bear, notes, price:last.close };
}

function computeScalpTradeSignal(candles5m, decimals){
  const c5  = candles5m;
  const c15 = aggregateCandles(candles5m, 3);
  const c30 = aggregateCandles(candles5m, 6);

  const a5  = analyzeScalp(c5);
  const a15 = analyzeScalp(c15);
  const a30 = analyzeScalp(c30);

  const perTF = [
    { tf:"5m",  signal:a5.signal  },
    { tf:"15m", signal:a15.signal },
    { tf:"30m", signal:a30.signal },
  ];

  let decision = "HOLD", reason = "";
  if(a15.signal==="HOLD"){
    reason = "15-min anchor timeframe is not aligned (needs 3-of-5 in one direction)";
  } else {
    const agrees = (a5.signal===a15.signal ? 1:0) + (a30.signal===a15.signal ? 1:0);
    if(agrees>=1){
      decision = a15.signal;
    } else {
      reason = "5-min and 30-min both disagree with the 15-min lean — standing aside";
    }
  }

  const entry = c5[c5.length-1].close;

  const recent15 = c15.slice(-10);
  const avgRange = recent15.length
    ? recent15.reduce((s,c)=>s+(c.high-c.low),0) / recent15.length
    : entry * 0.001;

  let sl=null, tp=null, rr=2;
  if(decision==="BUY"){ sl = entry - avgRange; tp = entry + avgRange*rr; }
  else if(decision==="SELL"){ sl = entry + avgRange; tp = entry - avgRange*rr; }

  const fmt = (v)=> v==null ? "—" : v.toFixed(decimals);

  return { decision, reason, perTF, entry:fmt(entry), sl:fmt(sl), tp:fmt(tp), rr,
           rawEntry:entry, rawSl:sl, rawTp:tp };
}

const SCALP_OPEN_KEY = "pipsight_scalp_open_v1";

function loadScalpHistory(){

  catch(e){ return []; }

}

function updateScalpTracker(pairKey, ts){
  const open = loadScalpOpen();
  const existing = open[pairKey];
  const price = ts.rawEntry;

  if(existing){
    let outcome = null;
    if(existing.direction==="BUY"){
      if(price>=existing.tp) outcome="WIN";
      else if(price<=existing.sl) outcome="LOSS";
    } else {
      if(price<=existing.tp) outcome="WIN";
      else if(price>=existing.sl) outcome="LOSS";
    }
    if(outcome){
      if(pipLearner && existing.learnerId){
        const profitPoints = outcome==="WIN" ? Math.abs(price-existing.entry) : -Math.abs(price-existing.entry);
        pipLearner.resolveSignal(existing.learnerId, outcome, profitPoints);
        persistLearner();
      }
      const history = loadScalpHistory();
      history.push({ pair:pairKey, direction:existing.direction, entry:existing.entry,
                      sl:existing.sl, tp:existing.tp, outcome, openedAt:existing.openedAt,
                      closedAt:new Date().toISOString() });
      saveScalpHistory(history);
      delete open[pairKey];
      saveScalpOpen(open);
    }
  } else if(ts.decision!=="HOLD" && ts.rawSl!=null && ts.rawTp!=null){
    const learnerId = pipLearner ? pipLearner.recordSignal({
      pair: pairKey,
      timeframe: "5m",
      strategy: "scalp",
      entry: price,
      indicators: ["EMA","RSI","MACD"],
    }) : null;
    if(pipLearner) persistLearner();
    open[pairKey] = { direction:ts.decision, entry:price, sl:ts.rawSl, tp:ts.rawTp,
                       openedAt:new Date().toISOString(), learnerId };
    saveScalpOpen(open);
  }
}

const SCALP_LOG_DISPLAY_WINDOW_MS = 48*60*60*1000;
function withinDisplayWindow(isoTs){
  return (Date.now() - new Date(isoTs).getTime()) <= SCALP_LOG_DISPLAY_WINDOW_MS;
}

function scalpAccuracyStats(){
  const history = loadScalpHistory().filter(h=>withinDisplayWindow(h.closedAt));
  const open = loadScalpOpen();
  const wins = history.filter(h=>h.outcome==="WIN").length;
  const losses = history.filter(h=>h.outcome==="LOSS").length;
  const total = wins + losses;
  const winRate = total ? Math.round((wins/total)*100) : null;
  return { total, wins, losses, winRate, openCount: Object.keys(open).length };
}

function scalpAccuracyStatsForPair(pairKey){
  const history = loadScalpHistory().filter(h=>h.pair===pairKey && withinDisplayWindow(h.closedAt));
  const wins = history.filter(h=>h.outcome==="WIN").length;
  const losses = history.filter(h=>h.outcome==="LOSS").length;
  const total = wins + losses;
  const winRate = total ? Math.round((wins/total)*100) : null;
  return { total, wins, losses, winRate };
}

function scalpLogRowsForPair(pairKey, decimals){
  const open = loadScalpOpen()[pairKey];
  const history = loadScalpHistory().filter(h=>h.pair===pairKey && withinDisplayWindow(h.closedAt))
    .sort((a,b)=> new Date(b.closedAt) - new Date(a.closedAt))
    .slice(0,8);

  const rows = [];
  if(open){
    rows.push({ ts:open.openedAt, signal:open.direction, entry:open.entry, status:"OPEN" });
  }
  for(const h of history){
    rows.push({ ts:h.closedAt, signal:h.direction, entry:h.entry, status:h.outcome });
  }
  return rows;
}

            <span class="mono" style="font-size:10px;color:var(--muted);">
              <span class="robot-dot ${botIsLive ? "robot-on" : "robot-off"}"></span>${botIsLive ? "live" : "not reachable"}
            </span>
          </div>
        </div>
        <div class="loading">
          ${botIsLive
            ? "Bot is running — no qualifying pattern (≥70% confidence) found right now.<br/><span style='font-size:11px;color:var(--muted);'>This is normal, especially while the market is closed or quiet.</span>"
            : data
              ? "Bot hasn't reported in a while — check its GitHub Actions tab.<br/><span style='font-size:11px;color:var(--muted);'>Last update: " + new Date(data.updatedAt).toLocaleString() + "</span>"
              : "Pattern bot is initializing or not reachable...<br/><span style='font-size:11px;color:var(--muted);'>First signals appear within 5-10 minutes of it going live</span>"
          }
        </div>
      </div>
    `;
    return;
  }

  const signals = data.signals.filter(s => s && s.pair && s.timeframe);
  const sortedSignals = signals.slice().reverse().slice(0, 50);

  // Group by pair
  const byPair = {};
  for (const signal of sortedSignals) {
    if (!byPair[signal.pair]) byPair[signal.pair] = [];
    byPair[signal.pair].push(signal);
  }

  let html = `
    <div class="container">
      <div class="card">
        <div class="row" style="justify-content:space-between;margin-top:0;">
          <div class="label" style="margin-bottom:0;">AI Pattern Detector · Real-time Signals</div>
          <div class="mono" style="font-size:10px;color:var(--muted);">
            <span class="robot-dot ${botIsLive ? "robot-on" : "robot-off"}"></span>${botIsLive ? "Live" : "Last known"} · ${signals.length} total signals ${botFreshness}
          </div>
        </div>
      </div>
  `;

  // Render each pair
  for (const pair of ['XAUUSD', 'GBPJPY']) {
    if (!byPair[pair]) continue;

    const pairSignals = byPair[pair].slice(0, 10);
    const stats = calculatePairStats(pairSignals);

    html += `
      <div class="card" style="margin-top:14px;">
        <div class="row" style="justify-content:space-between;margin-top:0;margin-bottom:8px;">
          <div class="label" style="margin-bottom:0;">${pair} · Pattern Signals</div>
          <span class="mono" style="font-size:10px;color:var(--muted);">
            ${stats.buy} BUY · ${stats.sell} SELL · Win Rate: ${stats.winRate}
          </span>
        </div>

        <div style="display:grid;grid-template-columns:1fr;gap:10px;">
    `;

    for (const signal of pairSignals) {
      const badgeClass = signal.direction === 'BUY' ? 'badge-buy' : signal.direction === 'SELL' ? 'badge-sell' : 'badge-hold';
      const timeAgo = getTimeAgo(new Date(signal.createdAt || signal.timestamp));
      const riskColor = signal.riskReward >= 2 ? 'var(--buy)' : signal.riskReward >= 1.5 ? 'var(--hold)' : 'var(--sell)';

      html += `
        <div style="border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;background:rgba(255,255,255,.02);">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
            <div>
              <span style="font-weight:600;font-size:13px;">${signal.pattern}</span>
              <span class="mono" style="font-size:10px;color:var(--muted);margin-left:8px;">${signal.timeframe}</span>
            </div>
            <span class="badge ${badgeClass}" style="font-size:12px;padding:4px 12px;">${signal.direction}</span>
          </div>

          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;font-size:11px;">
            <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
              <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">Entry</div>
              <div class="mono" style="font-weight:600;">${signal.entry.toFixed(signal.pair === 'GBPJPY' ? 3 : 2)}</div>
            </div>
            <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
              <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">Stop</div>
              <div class="mono" style="font-weight:600;">${signal.stopLoss.toFixed(signal.pair === 'GBPJPY' ? 3 : 2)}</div>
            </div>
            <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
              <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">TP1</div>
              <div class="mono" style="font-weight:600;">${signal.takeProfit1.toFixed(signal.pair === 'GBPJPY' ? 3 : 2)}</div>
            </div>
            <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
              <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">R:R</div>
              <div class="mono" style="font-weight:600;color:${riskColor};">1:${signal.riskReward.toFixed(1)}</div>
            </div>
          </div>

          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
            <span class="badge" style="background:rgba(201,162,76,.13);color:var(--accent);border:1px solid rgba(201,162,76,.35);">Confidence: ${signal.confidence}%</span>
            <span class="mono" style="font-size:9px;color:var(--muted);align-self:center;">
              ${signal.strength ? '| Strength: ' + signal.strength.toFixed(0) + '%' : ''}
            </span>
          </div>

          <div style="padding:10px;background:rgba(255,255,255,.03);border-radius:4px;font-size:11px;line-height:1.5;color:rgba(236,232,223,.85);">
            <strong>Pattern:</strong> ${signal.description ? signal.description.substring(0, 120) + '...' : 'Pattern confirmed with strong signal.'}
          </div>

          <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);">
            <div class="mono" style="font-size:9px;color:var(--muted);">
              Signal: ${timeAgo} · Status: ${signal.status || 'CONFIRMED'}
            </div>
          </div>
        </div>
      `;
    }

    html += `</div></div>`;
  }

  // Add info card
  html += `
    <div class="card" style="margin-top:14px;">
      <div class="label">About Pattern Detector</div>
      <div class="scope-note">
        <b>Standalone AI Bot</b> that detects 18+ chart patterns (Double Top/Bottom, Head & Shoulders, Triangles, Wedges, Pennants, etc.) 
        across 5 timeframes (5m-4H). Runs independently every 5 minutes on GitHub Actions (free). 
        <b>Self-learning system</b> - confidence improves based on historical accuracy. Only generates signals with &geq;70% confidence.
        <br/><br/>
        <b>Data Updated:</b> Every 5 minutes | <b>Source:</b> GitHub + Candle Data | <b>Status:</b> Fully Autonomous
      </div>
    </div>

    <div style="padding:20px;text-align:center;color:var(--muted);font-size:10px;">
      Pattern Detector Bot · Integrated with PipSight · Not financial advice
    </div>
  `;

  el.innerHTML = html;
}

function calculatePairStats(signals) {
  const buy = signals.filter(s => s.direction === 'BUY').length;
  const sell = signals.filter(s => s.direction === 'SELL').length;
  
  // TODO: Add actual win rate calculation from resolved signals
  const winRate = '—';

  return { buy, sell, winRate };
}

function getTimeAgo(date) {
  const now = new Date();
  const diff = now - date;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (minutes < 1) return 'just now';
  if (minutes < 60) return `${minutes}m ago`;
  if (hours < 24) return `${hours}h ago`;
  return `${days}d ago`;
}

// Auto-refresh pattern data
setInterval(() => {
  if (currentMode === 'patterns') {
    renderPatternPanel();
  }
}, 60000);

// END PATTERN DETECTOR INTEGRATION

</script>
