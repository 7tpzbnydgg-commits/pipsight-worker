<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PipSight · Trading Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f0f;
      --fg: #ececdf;
      --muted: #8f8e89;
      --border: #2a2a2a;
      --buy: #2bac5e;
      --sell: #d64045;
      --hold: #c9a24c;
      --accent: #c9a24c;
      --card-bg: #1a1a1a;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      line-height: 1.5;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .time {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .tab {
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .tab:hover {
      color: var(--fg);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      word-break: break-word;
    }

    .card:hover {
      border-color: var(--muted);
      transition: border 0.3s ease;
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .mono {
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
    }

    .badge-buy {
      background: rgba(43, 172, 94, 0.1);
      color: var(--buy);
      border-color: rgba(43, 172, 94, 0.35);
    }

    .badge-sell {
      background: rgba(214, 64, 69, 0.1);
      color: var(--sell);
      border-color: rgba(214, 64, 69, 0.35);
    }

    .badge-hold {
      background: rgba(201, 162, 76, 0.1);
      color: var(--accent);
      border-color: rgba(201, 162, 76, 0.35);
    }

    .robot-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sell);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .robot-dot.robot-on {
      background: var(--buy);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading {
      text-align: center;
      color: var(--muted);
      padding: 30px;
      font-size: 14px;
    }

    .scope-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    #scalpContainer {
      display: none;
    }

    #patternContainer {
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="title">📊 PipSight</div>
      <div style="font-size: 11px; color: var(--muted); margin-top: 4px;">Trading Intelligence Dashboard</div>
    </div>
    <div class="time" id="currentTime"></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="setMode('daily')">XAUUSD</button>
    <button class="tab" onclick="setMode('weekly')">GBPJPY</button>
    <button class="tab" onclick="setMode('scalp')">Scalping</button>
    <button class="tab" onclick="setMode('patterns')">Patterns</button>
  </div>

  <!-- Daily/Weekly Container -->
  <div class="container" id="container"></div>

  <!-- Scalp Container -->
  <div class="container" id="scalpContainer" style="display:none;"></div>

  <!-- Pattern Detector Container -->
  <div class="container" id="patternContainer" style="display:none;"></div>

  <script>
    // ============================================
    // PIPSIGHT MAIN FUNCTIONALITY
    // ============================================

    let currentIdx = 0;
    let currentMode = 'daily';
    let DATA = {};
    let PATTERN_DATA = null;
    let PATTERN_DATA_FETCHED_AT = 0;

    // Update time
    function updateTime() {
      const now = new Date();
      document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: true 
      });
    }
    updateTime();
    setInterval(updateTime, 1000);

    // Main mode setter
    function setMode(mode) {
      if (mode === currentMode) return;
      currentMode = mode;

      // Update active tab
      document.querySelectorAll(".tab").forEach((tab, i) => {
        tab.classList.toggle("active", 
          (i === 0 && mode === 'daily') ||
          (i === 1 && mode === 'weekly') ||
          (i === 2 && mode === 'scalp') ||
          (i === 3 && mode === 'patterns')
        );
      });

      // Show/hide containers
      document.getElementById("container").style.display = (mode === 'daily' || mode === 'weekly') ? '' : 'none';
      document.getElementById("scalpContainer").style.display = mode === 'scalp' ? '' : 'none';
      document.getElementById("patternContainer").style.display = mode === 'patterns' ? '' : 'none';

      // Render appropriate content
      if (mode === 'daily' || mode === 'weekly') {
        currentIdx = mode === 'daily' ? 0 : 1;
        renderMainPanel();
      } else if (mode === 'scalp') {
        renderScalpPanel();
      } else if (mode === 'patterns') {
        renderPatternPanel();
      }
    }

    // Render main dashboard (XAUUSD/GBPJPY)
    async function renderMainPanel() {
      const el = document.getElementById("container");
      const pair = currentIdx === 0 ? 'XAUUSD' : 'GBPJPY';
      
      el.innerHTML = `
        <div class="card">
          <div class="label">${pair}</div>
          <div class="mono" style="font-size: 20px; margin: 12px 0;">Loading data...</div>
          <div class="scope-note">Fetching latest market data and signals</div>
        </div>
      `;

      // Fetch data from GitHub
      try {
        const res = await fetch('https://raw.githubusercontent.com/7tpzbnydgg-commits/pipsight-worker/main/data/scalp-candles.json?t=' + Date.now());
        if (res.ok) {
          const data = await res.json();
          DATA = data;
          
          // Display data
          if (data[pair]) {
            const candles = data[pair]['1H'] || [];
            const latestCandle = candles[candles.length - 1];
            
            el.innerHTML = `
              <div class="card">
                <div class="label">${pair}</div>
                <div class="mono" style="font-size: 18px; margin: 12px 0; font-weight: 600;">
                  ${latestCandle ? latestCandle.close.toFixed(2) : 'N/A'}
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
                  <div style="background: rgba(255,255,255,.03); padding: 8px; border-radius: 4px;">
                    <div style="font-size: 9px; color: var(--muted);">HIGH</div>
                    <div class="mono" style="font-weight: 600;">${latestCandle ? latestCandle.high.toFixed(2) : 'N/A'}</div>
                  </div>
                  <div style="background: rgba(255,255,255,.03); padding: 8px; border-radius: 4px;">
                    <div style="font-size: 9px; color: var(--muted);">LOW</div>
                    <div class="mono" style="font-weight: 600;">${latestCandle ? latestCandle.low.toFixed(2) : 'N/A'}</div>
                  </div>
                </div>
                <div class="scope-note" style="margin-top: 12px;">
                  Data updated every 5 minutes. Latest signals available in Scalping & Patterns tabs.
                </div>
              </div>
            `;
          }
        }
      } catch (err) {
        el.innerHTML = `
          <div class="card">
            <div class="label">${pair}</div>
            <div class="scope-note" style="color: var(--sell);">Error loading data: ${err.message}</div>
          </div>
        `;
      }
    }

    // Render scalping signals
    async function renderScalpPanel() {
      const el = document.getElementById("scalpContainer");
      el.innerHTML = '<div class="loading">Loading scalping signals...</div>';

      try {
        const res = await fetch('https://raw.githubusercontent.com/7tpzbnydgg-commits/pipsight-worker/main/data/scalp-candles.json?t=' + Date.now());
        if (res.ok) {
          const data = await res.json();
          
          let html = `
            <div class="card">
              <div class="label">Scalping Signals · 5m-15m Timeframes</div>
              <div class="mono" style="font-size: 10px; color: var(--muted); margin-top: 8px;">
                <span class="robot-dot robot-on"></span>Live signals
              </div>
            </div>
          `;

          for (const pair of ['XAUUSD', 'GBPJPY']) {
            if (data[pair]) {
              html += `
                <div class="card">
                  <div class="label">${pair}</div>
                  <div class="scope-note">
                    Scalping analysis for 5m and 15m timeframes
                  </div>
                </div>
              `;
            }
          }

          el.innerHTML = html;
        }
      } catch (err) {
        el.innerHTML = `<div class="card"><div class="scope-note" style="color: var(--sell);">Error loading scalping data</div></div>`;
      }
    }

    // ============================================
    // PATTERN DETECTOR BOT INTEGRATION
    // ============================================

    async function getPatternData() {
      const now = Date.now();
      if (!PATTERN_DATA || now - PATTERN_DATA_FETCHED_AT > 60000) {
        try {
          const res = await fetch('https://raw.githubusercontent.com/Detector-byte/pattern-detector-bot/main/data/pattern-signals.json?t=' + now);
          if (res.ok) {
            PATTERN_DATA = await res.json();
            PATTERN_DATA_FETCHED_AT = now;
          }
        } catch (e) {
          console.log('Pattern data fetch failed:', e.message);
        }
      }
      return PATTERN_DATA;
    }

    async function renderPatternPanel() {
      const el = document.getElementById("patternContainer");
      if (!el) return;

      el.innerHTML = '<div class="loading">Loading pattern signals...</div>';

      const data = await getPatternData();

      if (!data || !data.signals || data.signals.length === 0) {
        el.innerHTML = `
          <div class="card">
            <div class="loading">
              Pattern bot is initializing...<br/>
              <span style="font-size:11px;color:var(--muted);">First signals appear within 5-10 minutes</span>
            </div>
          </div>
        `;
        return;
      }

      const signals = data.signals.filter(s => s && s.pair && s.timeframe);
      const sortedSignals = signals.slice().reverse().slice(0, 50);

      const byPair = {};
      for (const signal of sortedSignals) {
        if (!byPair[signal.pair]) byPair[signal.pair] = [];
        byPair[signal.pair].push(signal);
      }

      let html = `
        <div class="card">
          <div class="row" style="justify-content:space-between;margin-top:0;">
            <div class="label" style="margin-bottom:0;">AI Pattern Detector · Real-time Signals</div>
            <div class="mono" style="font-size:10px;color:var(--muted);">
              <span class="robot-dot robot-on"></span>Live · ${signals.length} total
            </div>
          </div>
        </div>
      `;

      for (const pair of ['XAUUSD', 'GBPJPY']) {
        if (!byPair[pair]) continue;

        const pairSignals = byPair[pair].slice(0, 10);
        const buy = pairSignals.filter(s => s.direction === 'BUY').length;
        const sell = pairSignals.filter(s => s.direction === 'SELL').length;

        html += `
          <div class="card" style="margin-top:14px;">
            <div class="row" style="justify-content:space-between;margin-top:0;margin-bottom:8px;">
              <div class="label" style="margin-bottom:0;">${pair} · Pattern Signals</div>
              <span class="mono" style="font-size:10px;color:var(--muted);">
                ${buy} BUY · ${sell} SELL
              </span>
            </div>

            <div style="display:grid;grid-template-columns:1fr;gap:10px;">
        `;

        for (const signal of pairSignals) {
          const badgeClass = signal.direction === 'BUY' ? 'badge-buy' : signal.direction === 'SELL' ? 'badge-sell' : 'badge-hold';
          const decimals = pair === 'GBPJPY' ? 3 : 2;
          const riskColor = signal.riskReward >= 2 ? 'var(--buy)' : signal.riskReward >= 1.5 ? 'var(--hold)' : 'var(--sell)';

          html += `
            <div style="border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;background:rgba(255,255,255,.02);">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
                <div>
                  <span style="font-weight:600;font-size:13px;">${signal.pattern}</span>
                  <span class="mono" style="font-size:10px;color:var(--muted);margin-left:8px;">${signal.timeframe}</span>
                </div>
                <span class="badge ${badgeClass}" style="font-size:12px;padding:4px 12px;">${signal.direction}</span>
              </div>

              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;font-size:11px;">
                <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
                  <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">Entry</div>
                  <div class="mono" style="font-weight:600;">${signal.entry.toFixed(decimals)}</div>
                </div>
                <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
                  <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">Stop</div>
                  <div class="mono" style="font-weight:600;">${signal.stopLoss.toFixed(decimals)}</div>
                </div>
                <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
                  <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">TP1</div>
                  <div class="mono" style="font-weight:600;">${signal.takeProfit1.toFixed(decimals)}</div>
                </div>
                <div style="background:rgba(255,255,255,.03);padding:8px;border-radius:4px;">
                  <div style="color:var(--muted);font-size:9px;margin-bottom:2px;">R:R</div>
                  <div class="mono" style="font-weight:600;color:${riskColor};">1:${signal.riskReward.toFixed(1)}</div>
                </div>
              </div>

              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
                <span class="badge" style="background:rgba(201,162,76,.13);color:var(--accent);border:1px solid rgba(201,162,76,.35);">Confidence: ${signal.confidence}%</span>
              </div>

              <div style="padding:10px;background:rgba(255,255,255,.03);border-radius:4px;font-size:11px;line-height:1.5;color:rgba(236,232,223,.85);">
                <strong>Pattern:</strong> ${signal.description ? signal.description.substring(0, 120) + '...' : 'Pattern confirmed.'}
              </div>
            </div>
          `;
        }

        html += `</div></div>`;
      }

      html += `
        <div class="card" style="margin-top:14px;">
          <div class="label">About Pattern Detector</div>
          <div class="scope-note">
            <b>Standalone AI Bot</b> detects 18+ patterns (Double Top/Bottom, Head & Shoulders, Triangles, Wedges, Pennants, etc.) 
            across 5 timeframes. Runs every 5 minutes on GitHub Actions. Self-learning system improves daily. Only 70%+ confidence signals shown.
          </div>
        </div>

        <div style="padding:20px;text-align:center;color:var(--muted);font-size:10px;">
          Pattern Detector Bot · Autonomous · Not financial advice
        </div>
      `;

      el.innerHTML = html;
    }

    // Auto-refresh pattern data
    setInterval(() => {
      if (currentMode === 'patterns') {
        renderPatternPanel();
      }
    }, 60000);

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      renderMainPanel();
    });

    // END PATTERN DETECTOR INTEGRATION
  </script>

</body>
</html>
